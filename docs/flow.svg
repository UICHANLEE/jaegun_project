<svg width="1440" height="940" viewBox="0 0 1440 940" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="940" fill="#101820"/>
  <rect x="40" y="40" width="1360" height="860" rx="18" fill="#17212B" stroke="#E8C477" stroke-opacity=".22" stroke-width="2"/>
  <text x="80" y="102" fill="#F5EAD7" font-family="Arial, sans-serif" font-size="34" font-weight="800">목양실 10:12 앱 흐름도</text>
  <text x="80" y="136" fill="#BDB09A" font-family="Arial, sans-serif" font-size="17">밝은 레크레이션 화면에서 시작해 관리자 신호로 25대 휴대폰이 크라임씬 화면으로 전환되는 구조</text>

  <defs>
