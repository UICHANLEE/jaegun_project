  <path d="M1180 584 C1118 584 1108 694 950 694 C770 694 730 600 720 546" stroke="#DF735F" stroke-width="3" stroke-dasharray="10 10"/>

  <rect x="80" y="730" width="1280" height="110" rx="10" fill="#0F1720" stroke="#E8C477" stroke-opacity=".2"/>
  <text x="112" y="775" fill="#E8C477" font-family="Arial, sans-serif" font-size="20" font-weight="800">운영 안정성</text>
  <text x="112" y="812" fill="#F5EAD7" font-family="Arial, sans-serif" font-size="17">25대 휴대폰 × 0.85~1.35초 랜덤 폴링 = 요청 분산. Vercel에서는 Redis 저장소가 있어야 모든 인스턴스가 같은 모드를 공유합니다.</text>
