    <text x="110" y="290" fill="#58728A" font-family="Arial, sans-serif" font-size="16">player.html</text>
    <text x="110" y="316" fill="#58728A" font-family="Arial, sans-serif" font-size="16">팀별 휴대폰 25대</text>
